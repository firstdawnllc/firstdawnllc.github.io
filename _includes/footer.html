<footer class="site-footer h-card">
  <data class="u-url" href="{{ "/" | relative_url }}"></data>

  <div class="wrapper">

    <div class="footer-col-wrapper">
      <div class="footer-col">
        <div class="footer-brand">
          <img alt="First Dawn LLC" src="{{ 'assets/icon.svg' | relative_url }}" width="28" height="28"/>
          {%- if site.author %}
          <ul class="contact-list">
            {% if site.author.name -%}
              <li class="p-name">{{ site.author.name | escape }}</li>
            {% endif -%}
            {% if site.author.email -%}
              <li><a class="u-email" href="mailto:{{ site.author.email }}">{{ site.author.email }}</a></li>
            {%- endif %}
          </ul>
          {%- endif %}
        </div>
      </div>
      <div class="footer-col">
        <p>{{ site.description | escape }}</p>
      </div>
      <div class="footer-col footer-links-col">
        <ul class="footer-nav">
          <li><a href="https://marketplace.atlassian.com/vendors/1226209/" target="_blank" rel="noopener noreferrer">Atlassian Marketplace ↗</a></li>
          <li><a href="https://firstdawnllc.atlassian.net/servicedesk/customer/portal/1" target="_blank" rel="noopener noreferrer">Support Portal ↗</a></li>
        </ul>
      </div>
    </div>

  </div>

</footer>
