<svg width="680" height="680" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg">
<defs>
<clipPath id="circleClip">
<circle cx="340" cy="340" r="260"/>
</clipPath>
</defs>

<!-- Circle background -->
<circle cx="340" cy="340" r="260" fill="#1e3d5e" stroke="#1e3d5e" stroke-width="8"/>

<!-- Clipped interior -->
<g clip-path="url(#circleClip)">
<!-- Deep sky -->
<rect x="60" y="60" width="560" height="560" fill="#1e3d5e"/>

<!-- Warm horizon glow -->
<ellipse cx="340" cy="390" rx="320" ry="160" fill="#d4482a" opacity="0.2"/>
<ellipse cx="340" cy="390" rx="240" ry="110" fill="#e8652e" opacity="0.25"/>
<ellipse cx="340" cy="390" rx="160" ry="65" fill="#f5a623" opacity="0.35"/>

<!-- Sun half-circle -->
<circle cx="340" cy="390" r="72" fill="#f5a623"/>
<rect x="80" y="390" width="520" height="220" fill="#1e3d5e"/>

<!-- Sun rays (7 total) -->
<line x1="340" y1="268" x2="340" y2="220" stroke="#f5a623" stroke-width="4" stroke-linecap="round"/>
<line x1="394" y1="278" x2="420" y2="238" stroke="#f5a623" stroke-width="4" stroke-linecap="round"/>
<line x1="440" y1="306" x2="478" y2="282" stroke="#f5a623" stroke-width="4" stroke-linecap="round"/>
<line x1="478" y1="346" x2="520" y2="336" stroke="#f5a623" stroke-width="4" stroke-linecap="round"/>
<line x1="286" y1="278" x2="260" y2="238" stroke="#f5a623" stroke-width="4" stroke-linecap="round"/>
<line x1="240" y1="306" x2="202" y2="282" stroke="#f5a623" stroke-width="4" stroke-linecap="round"/>
<line x1="202" y1="346" x2="160" y2="336" stroke="#f5a623" stroke-width="4" stroke-linecap="round"/>

<!-- Horizon line -->
<line x1="100" y1="390" x2="580" y2="390" stroke="#f5a623" stroke-width="3" stroke-linecap="round"/>
</g>

<!-- Muted slate border -->
<circle cx="340" cy="340" r="260" fill="none" stroke="#3d5a6e" stroke-width="4"/>
</svg>
